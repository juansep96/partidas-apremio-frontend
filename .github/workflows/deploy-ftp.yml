# Requiere estos Secrets en GitHub: Settings → Secrets and variables → Actions
# - FTP_SERVER: SOLO hostname sin protocolo (ej: ftp.ejemplo.com) - NO usar ftp:// ni https://
# - FTP_USERNAME: usuario FTP
# - FTP_PASSWORD: contraseña FTP
# - FTP_SERVER_DIR: ruta remota (ej: public_html/) - terminar con /
# Opcionales: FTP_PROTOCOL (ftp o ftps), FTP_PORT (21 o 990 para FTPS)
# Si tu host solo soporta SFTP, necesitás un workflow distinto (SFTP).
name: Build y deploy FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validar FTP_SERVER
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          if [[ "$SERVER" == *"://"* ]]; then
            echo "::error::FTP_SERVER debe ser SOLO el hostname (ej: ftp.ejemplo.com). No incluyas ftp:// ni https://"
            exit 1
          fi
          if [[ "$SERVER" == *"/"* ]]; then
            echo "::error::FTP_SERVER no debe tener barras. Solo el host: ftp.ejemplo.com"
            exit 1
          fi
          echo "Formato OK. Conectando a $SERVER..."

      - name: Deploy por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
